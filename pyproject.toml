# Конфигурация инструментов качества кода для HVAC Calculator.
# Линтер (ruff) и статическая типизация (mypy) прогоняются в CI —
# см. .github/workflows/ci.yml.

[tool.ruff]
target-version = "py310"
line-length = 100
# Внешние скрипты Revit/Dynamo живут вне пакета и не линтуются.
extend-exclude = ["dynamo", "revit_dynamo_apply_results.py",
                  "revit_dynamo_hvac_write_csv.py"]

[tool.ruff.lint]
# По умолчанию ruff включает pyflakes (F) + подмножество pycodestyle (E).
# F-коды (неиспользуемые импорты/переменные, undefined-name, дубли ключей)
# — реальные проблемы, держим включёнными. Компактный стиль кода
# (несколько операторов в строке, короткие имена циклов) — осознанный,
# не навязываем.
ignore = [
    "E701",  # multiple statements on one line (colon) — компактный стиль
    "E702",  # multiple statements on one line (semicolon)
    "E741",  # ambiguous variable name (l/I/O) — короткие матем. циклы
]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true       # PySide6/matplotlib/openpyxl без стабов
implicit_optional = true            # legacy: `x: str = None` допускаем
warn_redundant_casts = true
warn_unused_ignores = false
# Не-строгий режим: не требуем тотальных аннотаций (disallow_untyped_defs),
# но тела untyped-функций всё же проверяем — ловит реальные ошибки типов
# внутри методов без сигнатур (UI-слой).
check_untyped_defs = true
disallow_untyped_defs = false
# Гейт типизации — расчётное ядро (физика + движки). Проверяется в CI.
# follow_imports=silent ограничивает отчёт списком `files`; остальные
# модули используются для типов, но их ошибки не блокируют сборку.
# Подключать новые модули по мере очистки (см. README, раздел разработки).
follow_imports = "silent"
files = [
    "hvac/models.py",
    "hvac/parsers.py",
    "hvac/data_loader.py",
    "hvac/psychro.py",
    "hvac/dew_point.py",
    "hvac/dhw.py",
    "hvac/smoke.py",
    "hvac/smoke_formulas.py",
    "hvac/duct_sizing.py",
    "hvac/pipe_sizing.py",
    "hvac/acoustics.py",
    "hvac/ahu_load.py",
    "hvac/vrf.py",
    "hvac/fancoil_catalog.py",
    "hvac/sizing_helpers.py",
    "hvac/equipment.py",
    "hvac/room_equipment.py",
    "hvac/templates.py",
    "hvac/engine/base.py",
    "hvac/engine/sp50.py",
    "hvac/engine/ventilation.py",
    "hvac/ahu_process.py",
    "hvac/duct_network.py",
    "hvac/underfloor.py",
    "hvac/heating_hydraulics.py",
    "hvac/radiator_catalog.py",
    "hvac/grille_catalog.py",
    "hvac/specification.py",
    "hvac/energy.py",
    "hvac/energy_simulation.py",
    "hvac/weather.py",
    "hvac/solar.py",
    "hvac/air_curtain.py",
    "hvac/heat_exchanger.py",
    "hvac/fan_catalog.py",
    # io-слой (сериализация/экспорт)
    "hvac/io_revit.py",
    "hvac/io_json.py",
    "hvac/io_excel_equipment.py",
    "hvac/io_hlgc.py",
    "hvac/io_excel/_common.py",
    "hvac/io_excel/_core.py",
    "hvac/io_excel/_extensions.py",
    "hvac/io_excel/_detailed.py",
    "hvac/io_excel/__init__.py",
    "hvac/io_pdf.py",
    # UI-слой целиком. Ложные attr-defined (unscoped Qt-enum'ы) и
    # override (Qt6-строгость стабов моделей) заглушены в
    # [[tool.mypy.overrides]] ниже; реальные ошибки UI вычищены.
    "hvac/ui_qt/",
]

# UI: глушим ложные attr-defined от unscoped Qt-enum'ов (PySide6-стабы
# знают только scoped-форму Qt.AlignmentFlag.AlignLeft; код работает в
# рантайме через алиасы). Реальные ошибки UI (override/union-attr/
# arg-type) остаются включёнными и чинятся.
[[tool.mypy.overrides]]
module = "hvac.ui_qt.*"
# attr-defined — unscoped Qt-enum'ы (см. выше).
# override — Qt6-строгость стабов: виртуальные методы моделей/делегатов
#   (data/flags/setData/...) объявлены с QModelIndex, а стаб требует
#   QModelIndex | QPersistentModelIndex (взаимозаменяемы в рантайме).
# Реальные ошибки (union-attr/arg-type/assignment/...) остаются включёнными.
disable_error_code = ["attr-defined", "override"]
